<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#f5efe0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="中华美食地图" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/png" href="/0001.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/0001.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/0001.png?v=2" />
    <link rel="apple-touch-icon" href="/0001.png?v=2" />
    <link rel="shortcut icon" href="/0001.png?v=2" />
    <title>中华美食地图 · 寻味九州</title>
    <meta name="description" content="以地图探索中华美食文化：四大菜系、八大菜系、三十四省市代表美食与传统流行分类" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"><div id="loading" style="padding:20px;color:#666;">加载中...</div></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap;">JS Error: ' + e.message + '\n' + (e.error ? e.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap;">Promise Error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
